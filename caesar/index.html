<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caesar Cypher</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <h1>Caesar Cypher</h1>
      <p class="subtitle">Vanilla JS</p>

      <label for="key">Cypher key</label>
      <input type="number" id="key" value="6" min="0" max="25" />

      <textarea id="message" placeholder="Enter text">Hello World!</textarea>

      <button id="cypherBtn">Cypher</button>

      <p id="result"></p>
    </div>

    <script src="main.js"></script>
  </body>
</html>
